<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Harshit Rathaur</title>
  <meta name="robots" content="noindex" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black: #060810;
      --blue: #1a6bff;
      --cyan: #00e5ff;
      --white: #f0f4ff;
      --white-dim: #8a96b0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 40%, rgba(26,107,255,0.15) 0%, transparent 60%);
      animation: pulse 4s ease-in-out infinite alternate;
    }
    @keyframes pulse { 0% { opacity: 0.7; } 100% { opacity: 1; } }
    .wrap { position: relative; z-index: 1; padding: 2rem; }
    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(5rem, 15vw, 10rem);
      line-height: 1;
      background: linear-gradient(135deg, var(--white) 30%, var(--cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -4px;
    }
    p {
      color: var(--white-dim);
      margin: 1rem 0 2rem;
      font-size: 1.05rem;
    }
    a.btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 2rem;
      border-radius: 100px;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      color: #04101f;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    a.btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(26,107,255,0.4);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
    <p>This page drifted off into the void. Let's get you back.</p>
    <a class="btn" href="/">← Back to Home</a>
  </div>
</body>
</html>
